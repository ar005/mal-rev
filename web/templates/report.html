<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report — {{ sha256[:12] }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f14; color: #d4d4d8; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #18181b; border-bottom: 1px solid #27272a; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
  header a { color: #60a5fa; font-size: 0.875rem; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  header h1 { font-size: 1rem; color: #f4f4f5; font-weight: 600; }
  .sha { font-family: monospace; font-size: 0.78rem; color: #71717a; margin-left: auto; }
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar: code file list */
  .sidebar { width: 260px; flex-shrink: 0; background: #18181b; border-right: 1px solid #27272a; overflow-y: auto; padding: 1rem 0; }
  .sidebar h2 { font-size: 0.75rem; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 1rem 0.5rem; }
  .sidebar ul { list-style: none; }
  .sidebar li a { display: block; padding: 0.4rem 1rem; font-size: 0.8rem; font-family: monospace; color: #a5f3fc; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar li a:hover { background: #27272a; color: #f4f4f5; }
  .sidebar .empty { padding: 0.5rem 1rem; font-size: 0.8rem; color: #52525b; }

  /* Code viewer pane */
  .code-pane { flex: 1; overflow: hidden; display: none; flex-direction: column; background: #0f0f14; }
  .code-pane.active { display: flex; }
  .code-pane-header { padding: 0.5rem 1rem; background: #1a1a23; border-bottom: 1px solid #27272a; font-size: 0.8rem; color: #71717a; font-family: monospace; display: flex; align-items: center; justify-content: space-between; }
  .code-pane-header button { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 0.8rem; }
  .code-pane pre { flex: 1; overflow: auto; padding: 1rem; font-size: 0.8rem; line-height: 1.6; color: #d4d4d8; font-family: 'Cascadia Code', 'Fira Code', monospace; }

  /* Report main area */
  main { flex: 1; overflow-y: auto; padding: 2rem; max-width: 900px; }
  .report h1 { font-size: 1.5rem; color: #f4f4f5; margin: 1rem 0 0.5rem; }
  .report h2 { font-size: 1.1rem; color: #60a5fa; margin: 1.75rem 0 0.75rem; border-bottom: 1px solid #27272a; padding-bottom: 0.4rem; }
  .report h3 { font-size: 0.95rem; color: #a78bfa; margin: 1rem 0 0.5rem; }
  .report p { line-height: 1.7; margin: 0.5rem 0; font-size: 0.9rem; }
  .report ul, .report ol { margin: 0.5rem 0 0.5rem 1.5rem; font-size: 0.9rem; line-height: 1.7; }
  .report table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 0.75rem 0; }
  .report th { background: #18181b; text-align: left; padding: 0.5rem 0.75rem; color: #71717a; border: 1px solid #27272a; }
  .report td { padding: 0.45rem 0.75rem; border: 1px solid #27272a; }
  .report tr:hover td { background: #18181b; }
  .report code { background: #1f1f23; padding: 1px 5px; border-radius: 3px; font-size: 0.82rem; font-family: monospace; color: #a5f3fc; }
  .report pre { background: #1a1a23; border: 1px solid #27272a; border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 0.8rem; line-height: 1.5; margin: 0.75rem 0; }
  .report pre code { background: none; padding: 0; color: #d4d4d8; }
  .report hr { border: none; border-top: 1px solid #27272a; margin: 1.5rem 0; }
  .report strong { color: #f4f4f5; }
  .report a { color: #60a5fa; }
</style>
</head>
<body>
<header>
  <a href="/">← Reports</a>
  <h1>Threat Report</h1>
  <span class="sha">{{ sha256 }}</span>
</header>

<div class="layout">
  <!-- Code file sidebar -->
  <nav class="sidebar">
    <h2>Decompiled Code</h2>
    {% if code_files %}
    <ul>
      {% for cf in code_files %}
      <li><a href="#" onclick="loadCode('{{ sha256 }}','{{ cf }}');return false;">{{ cf }}</a></li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No .c files<br>(install r2ghidra)</p>
    {% endif %}
  </nav>

  <!-- Code viewer (hidden until a file is clicked) -->
  <div class="code-pane" id="code-pane">
    <div class="code-pane-header">
      <span id="code-filename"></span>
      <button onclick="closeCode()">✕ Close</button>
    </div>
    <pre id="code-content"></pre>
  </div>

  <!-- Main report -->
  <main>
    <div class="report">{{ content | safe }}</div>
  </main>
</div>

<script>
async function loadCode(sha256, filename) {
  const pane = document.getElementById('code-pane');
  const pre  = document.getElementById('code-content');
  const lbl  = document.getElementById('code-filename');
  lbl.textContent = filename;
  pre.textContent = 'Loading…';
  pane.classList.add('active');
  const res = await fetch(`/report/${sha256}/code/${encodeURIComponent(filename)}`);
  pre.textContent = res.ok ? await res.text() : `Error: ${res.status}`;
}
function closeCode() {
  document.getElementById('code-pane').classList.remove('active');
}
</script>
</body>
</html>
